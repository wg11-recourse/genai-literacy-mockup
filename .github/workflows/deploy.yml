name: Build and deploy course

on:
  push:
    branches: [main]
  workflow_dispatch:

# Least-privilege permissions for the GitHub Pages artifact deploy flow.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deploy; let a newer run supersede an in-flight one.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install MarkBind
        run: npm install -g markbind-cli

      # Derive baseUrl from the repo name so the project-site subpath
      # (/<repo>) is correct without hand-maintaining it.
      - name: Build site
        run: markbind build --baseUrl "/${{ github.event.repository.name }}"

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
