<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 130" fill="none" stroke="#325d88" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" role="img" aria-label="A sequence of tokens predicting the next token, with a probability hint">
  <!-- known tokens -->
  <rect x="12" y="62" width="28" height="28" rx="5" fill="#f0ece4"/>
  <rect x="46" y="62" width="28" height="28" rx="5" fill="#f0ece4"/>
  <rect x="80" y="62" width="28" height="28" rx="5" fill="#f0ece4"/>
  <!-- arrow to the predicted token -->
  <path d="M114 76 L130 76" stroke-opacity="0.7"/>
  <path d="M125 71 L131 76 L125 81" stroke-opacity="0.7"/>
  <!-- probability hint above the prediction -->
  <g stroke-opacity="0.55">
    <path d="M140 58 L140 48"/>
    <path d="M150 58 L150 36"/>
    <path d="M160 58 L160 50"/>
  </g>
  <!-- predicted (next) token -->
  <rect x="136" y="62" width="28" height="28" rx="5" stroke-dasharray="4 4"/>
</svg>
