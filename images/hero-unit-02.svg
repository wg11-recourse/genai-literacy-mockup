<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 130" fill="none" stroke="#325d88" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" role="img" aria-label="A code window under review with an approval checkmark">
